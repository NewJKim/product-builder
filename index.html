<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fast Food Calorie Counter</title>
  <style>
    :root {
      --bg: #f5f5f3;
      --bg-card: #ebebea;
      --bg-input: #fff;
      --bg-item: #fff;
      --bg-progress: #ddddd9;
      --bg-btn-hover: #f0f0ee;
      --text: #1a1a1a;
      --text-sub: #666;
      --border: #ccc;
      --border-item: #ddd;
    }

    [data-theme="dark"] {
      --bg: #18181a;
      --bg-card: #27272b;
      --bg-input: #27272b;
      --bg-item: #27272b;
      --bg-progress: #38383d;
      --bg-btn-hover: #32323a;
      --text: #e8e8e6;
      --text-sub: #999;
      --border: #44444a;
      --border-item: #38383d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
      transition: background 0.2s, color 0.2s;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
    }

    .theme-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 12px;
      font-size: 13px;
      background: var(--bg-input);
      color: var(--text);
      cursor: pointer;
      height: 32px;
      white-space: nowrap;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .theme-btn:hover { background: var(--bg-btn-hover); }
    .theme-btn:active { transform: scale(0.98); }

    .theme-btn svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 1rem;
    }

    .card {
      background: var(--bg-card);
      border-radius: 8px;
      padding: 1rem;
      transition: background 0.2s;
    }

    .card p:first-child {
      font-size: 13px;
      color: var(--text-sub);
      margin-bottom: 4px;
    }

    .card p:last-child {
      font-size: 24px;
      font-weight: 500;
    }

    .progress-wrap {
      background: var(--bg-progress);
      border-radius: 8px;
      height: 8px;
      margin-bottom: 1.5rem;
      overflow: hidden;
      transition: background 0.2s;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: #1D9E75;
      border-radius: 8px;
      transition: width 0.3s, background 0.3s;
    }

    .row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    select, input[type="text"], input[type="number"] {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      background: var(--bg-input);
      color: var(--text);
      outline: none;
      height: 36px;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    select:focus, input:focus {
      border-color: #888;
    }

    button {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 14px;
      font-size: 14px;
      background: var(--bg-input);
      color: var(--text);
      cursor: pointer;
      height: 36px;
      white-space: nowrap;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    button:hover { background: var(--bg-btn-hover); }
    button:active { transform: scale(0.98); }

    #brand-select { flex: 1; min-width: 120px; }
    #item-select  { flex: 2; min-width: 160px; }
    #custom-name  { flex: 2; }
    #custom-cal   { flex: 1; min-width: 80px; }

    .item-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-item);
      border: 0.5px solid var(--border-item);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 6px;
      transition: background 0.2s, border-color 0.2s;
    }

    .item-row span:first-child { flex: 1; font-size: 14px; }
    .item-row .kcal { font-size: 14px; font-weight: 500; min-width: 70px; text-align: right; }
    .item-row .del {
      border: none;
      background: none;
      color: var(--text-sub);
      cursor: pointer;
      font-size: 18px;
      padding: 0 4px;
      line-height: 1;
      height: auto;
    }
    .item-row .del:hover { color: #e24b4a; background: none; }

    .goal-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 1rem;
    }

    .goal-row label { font-size: 13px; color: var(--text-sub); white-space: nowrap; }
    #goal-input { width: 90px; }
    #clear-btn { margin-left: auto; }

    /* ── Partnership form ─────────────────────────────────────── */
    .divider {
      border: none;
      border-top: 1px solid var(--border-item);
      margin: 2.5rem 0;
      transition: border-color 0.2s;
    }

    .section-title {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .section-desc {
      font-size: 13px;
      color: var(--text-sub);
      margin-bottom: 1.25rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 10px;
    }

    .form-group label {
      font-size: 13px;
      color: var(--text-sub);
    }

    .form-group input,
    .form-group textarea {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      background: var(--bg-input);
      color: var(--text);
      outline: none;
      width: 100%;
      font-family: inherit;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .form-group input { height: 36px; }

    .form-group textarea {
      height: 96px;
      resize: vertical;
      line-height: 1.5;
    }

    .form-group input:focus,
    .form-group textarea:focus { border-color: #888; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .submit-btn {
      width: 100%;
      height: 38px;
      margin-top: 6px;
      background: #1D9E75;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    .submit-btn:hover { background: #198f68; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .form-notice {
      font-size: 13px;
      text-align: center;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      display: none;
    }

    .form-notice.success {
      display: block;
      background: #d1f5e8;
      color: #0f6b48;
    }

    .form-notice.error {
      display: block;
      background: #fde8e8;
      color: #9b1c1c;
    }

    [data-theme="dark"] .form-notice.success { background: #0f3d2a; color: #4ade80; }
    [data-theme="dark"] .form-notice.error   { background: #3d0f0f; color: #f87171; }

    @media (max-width: 480px) {
      .cards { grid-template-columns: 1fr 1fr; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Fast Food Calorie Counter</h1>
    <button class="theme-btn" onclick="toggleTheme()" id="theme-btn" aria-label="Toggle theme">
      <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <!-- moon icon (shown in light mode) -->
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <span id="theme-label">Dark</span>
    </button>
  </div>

  <div class="cards">
    <div class="card">
      <p>Total calories</p>
      <p id="total-cal">0</p>
    </div>
    <div class="card">
      <p>Daily goal</p>
      <p id="goal-display">2,000</p>
    </div>
    <div class="card">
      <p>Remaining</p>
      <p id="remaining">2,000</p>
    </div>
  </div>

  <div class="progress-wrap">
    <div id="progress-bar"></div>
  </div>

  <div class="row">
    <select id="brand-select">
      <option value="">Brand</option>
      <option>Panda Express</option>
      <option>Subway</option>
    </select>
    <select id="item-select">
      <option value="">Select item</option>
    </select>
    <button onclick="addItem()">Add</button>
  </div>

  <div class="row">
    <input type="text" id="custom-name" placeholder="Custom item name" />
    <input type="number" id="custom-cal" placeholder="kcal" min="0" />
    <button onclick="addCustom()">Add</button>
  </div>

  <div id="item-list"></div>

  <div class="goal-row">
    <label>Daily goal:</label>
    <input type="number" id="goal-input" value="2000" min="500" max="5000" step="50" />
    <button onclick="updateGoal()">Set</button>
    <button id="clear-btn" onclick="clearAll()">Clear all</button>
  </div>

  <hr class="divider" />

  <p class="section-title">Partnership Inquiry</p>
  <p class="section-desc">Interested in working together? Send us a message and we'll get back to you.</p>

  <form id="contact-form" onsubmit="submitForm(event)">
    <div class="form-row">
      <div class="form-group">
        <label for="f-name">Name</label>
        <input type="text" id="f-name" name="name" placeholder="Jane Kim" required />
      </div>
      <div class="form-group">
        <label for="f-email">Email</label>
        <input type="email" id="f-email" name="email" placeholder="jane@company.com" required />
      </div>
    </div>
    <div class="form-group">
      <label for="f-company">Company (optional)</label>
      <input type="text" id="f-company" name="company" placeholder="Acme Corp" />
    </div>
    <div class="form-group">
      <label for="f-message">Message</label>
      <textarea id="f-message" name="message" placeholder="Tell us about your partnership idea..." required></textarea>
    </div>
    <button type="submit" class="submit-btn" id="submit-btn">Send message</button>
    <p class="form-notice" id="form-notice"></p>
  </form>
</div>

<script>
  const menu = {
    "Panda Express": [
      ["Item 1 (placeholder)", 0],
      ["Item 2 (placeholder)", 0],
      ["Item 3 (placeholder)", 0]
    ],
    "Subway": [
      ["Item 1 (placeholder)", 0],
      ["Item 2 (placeholder)", 0],
      ["Item 3 (placeholder)", 0]
    ]
  };

  let goal = 2000;
  let items = [];

  // ── Theme ──────────────────────────────────────────────────────────────────

  const SUN_ICON = `<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;
  const MOON_ICON = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    const icon = document.getElementById('theme-icon');
    const label = document.getElementById('theme-label');
    if (theme === 'dark') {
      icon.innerHTML = SUN_ICON;
      label.textContent = 'Light';
    } else {
      icon.innerHTML = MOON_ICON;
      label.textContent = 'Dark';
    }
    document.getElementById('remaining').style.color =
      document.getElementById('remaining').textContent.startsWith('-')
        ? '#e24b4a'
        : 'var(--text)';
  }

  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    localStorage.setItem('theme', next);
    applyTheme(next);
  }

  (function initTheme() {
    const saved = localStorage.getItem('theme');
    const preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    applyTheme(saved || preferred);
  })();

  // ── App logic ──────────────────────────────────────────────────────────────

  document.getElementById('brand-select').addEventListener('change', function () {
    const sel = document.getElementById('item-select');
    sel.innerHTML = '<option value="">Select item</option>';
    const brand = this.value;
    if (menu[brand]) {
      menu[brand].forEach(([name, cal]) => {
        const o = document.createElement('option');
        o.value = cal;
        o.textContent = name + ' — ' + cal + ' kcal';
        sel.appendChild(o);
      });
    }
  });

  function addItem() {
    const brand = document.getElementById('brand-select').value;
    const sel = document.getElementById('item-select');
    const cal = parseInt(sel.value);
    const name = sel.options[sel.selectedIndex]?.text?.split(' — ')[0];
    if (!brand || !cal || !name) return;
    items.push({ name: brand + ': ' + name, cal });
    render();
  }

  function addCustom() {
    const name = document.getElementById('custom-name').value.trim();
    const cal = parseInt(document.getElementById('custom-cal').value);
    if (!name || !cal || cal <= 0) return;
    items.push({ name, cal });
    document.getElementById('custom-name').value = '';
    document.getElementById('custom-cal').value = '';
    render();
  }

  function removeItem(i) {
    items.splice(i, 1);
    render();
  }

  function updateGoal() {
    const v = parseInt(document.getElementById('goal-input').value);
    if (v >= 500) { goal = v; render(); }
  }

  function clearAll() {
    items = [];
    render();
  }

  // ── Partnership form ───────────────────────────────────────────────────────

  async function submitForm(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const notice = document.getElementById('form-notice');
    btn.disabled = true;
    btn.textContent = 'Sending…';
    notice.className = 'form-notice';

    try {
      const res = await fetch('https://formspree.io/f/xbdejopp', {
        method: 'POST',
        headers: { 'Accept': 'application/json' },
        body: new FormData(e.target)
      });
      if (res.ok) {
        notice.className = 'form-notice success';
        notice.textContent = 'Message sent! We\'ll be in touch soon.';
        e.target.reset();
      } else {
        throw new Error();
      }
    } catch {
      notice.className = 'form-notice error';
      notice.textContent = 'Something went wrong. Please try again.';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Send message';
    }
  }

  // ── App logic ──────────────────────────────────────────────────────────────

  function render() {
    const total = items.reduce((s, x) => s + x.cal, 0);
    const remaining = goal - total;
    const pct = Math.min(100, Math.round(total / goal * 100));

    document.getElementById('total-cal').textContent = total.toLocaleString();
    document.getElementById('goal-display').textContent = goal.toLocaleString();

    const remEl = document.getElementById('remaining');
    remEl.textContent = remaining.toLocaleString();
    remEl.style.color = remaining < 0 ? '#e24b4a' : 'var(--text)';

    const bar = document.getElementById('progress-bar');
    bar.style.width = pct + '%';
    bar.style.background = pct >= 100 ? '#E24B4A' : pct >= 80 ? '#BA7517' : '#1D9E75';

    const list = document.getElementById('item-list');
    list.innerHTML = '';
    items.forEach((item, i) => {
      const row = document.createElement('div');
      row.className = 'item-row';
      row.innerHTML =
        '<span>' + item.name + '</span>' +
        '<span class="kcal">' + item.cal.toLocaleString() + ' kcal</span>' +
        '<button class="del" onclick="removeItem(' + i + ')">×</button>';
      list.appendChild(row);
    });
  }
</script>
</body>
</html>
